services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bilnov_dev
      POSTGRES_USER: bilnov
      POSTGRES_PASSWORD: bilnov_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bilnov -d bilnov_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bilnov_minio
      MINIO_ROOT_PASSWORD: bilnov_minio_secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 bilnov_minio bilnov_minio_secret &&
      mc mb myminio/bilnov-files --ignore-existing &&
      echo 'Bucket bilnov-files créé'
      "

volumes:
  postgres_data:
  minio_data:
